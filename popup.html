<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Red Viral Monitor</title>
  <style>
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --surface-2: #f1f5f9;
      --border: #d8dee8;
      --text: #111827;
      --muted: #667085;
      --accent: #e11d48;
      --accent-2: #be123c;
      --ok: #0f766e;
      --warn: #b45309;
      --danger: #b91c1c;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.10);
    }
    body[data-theme="dark"] {
      --bg: #111827;
      --surface: #1f2937;
      --surface-2: #263244;
      --border: #374151;
      --text: #f9fafb;
      --muted: #a7b0c0;
      --accent: #fb7185;
      --accent-2: #f43f5e;
      --ok: #2dd4bf;
      --warn: #f59e0b;
      --danger: #f87171;
      --shadow: 0 12px 34px rgba(0, 0, 0, 0.36);
    }
    * { box-sizing: border-box; }
    body {
      width: 360px;
      min-width: 360px;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 13px/1.45 Inter, Avenir Next, PingFang SC, Microsoft YaHei, sans-serif;
    }
    button, input, select {
      font: inherit;
    }
    .popup {
      padding: 14px;
    }
    .app-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .app-logo {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .app-title {
      min-width: 0;
      flex: 1;
    }
    .name {
      display: block;
      font-weight: 800;
      letter-spacing: 0;
    }
    .sub {
      display: block;
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .icon-button {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      color: var(--text);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .icon-button:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .icon-button svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 4px;
      padding: 3px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .tab-btn {
      height: 32px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 650;
    }
    .tab-btn[aria-selected="true"] {
      background: var(--surface);
      color: var(--accent);
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
    }
    [role="tabpanel"] {
      display: none;
    }
    [role="tabpanel"][data-active="1"] {
      display: block;
    }
    .section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 10px;
    }
    .section-title {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 800;
      margin: 0 0 10px;
    }
    .section-title svg {
      width: 15px;
      height: 15px;
      color: var(--accent);
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 34px;
    }
    .row + .row {
      margin-top: 8px;
    }
    .row label,
    .label {
      color: var(--text);
      font-weight: 650;
    }
    .hint {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 400;
      margin-top: 1px;
    }
    input[type="number"],
    select {
      width: 108px;
      height: 30px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      color: var(--text);
      padding: 0 8px;
    }
    .switch {
      position: relative;
      display: inline-flex;
      width: 42px;
      height: 24px;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: background 120ms, border-color 120ms;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: var(--surface);
      box-shadow: 0 1px 4px rgba(15, 23, 42, 0.22);
      transition: transform 120ms;
    }
    .switch input:checked + .slider {
      background: var(--accent);
      border-color: var(--accent);
    }
    .switch input:checked + .slider::before {
      transform: translateX(18px);
    }
    .actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    .btn {
      height: 32px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--text);
      padding: 0 12px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }
    .btn:hover {
      border-color: var(--accent);
    }
    .columns {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 6px;
    }
    .columns li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      min-height: 30px;
      padding: 0 8px;
      border-radius: 6px;
      background: var(--surface-2);
    }
    .columns input {
      accent-color: var(--accent);
    }
    .about-copy {
      margin: 0;
      color: var(--muted);
    }
    .about-copy strong {
      color: var(--text);
    }
    .version {
      margin-top: 10px;
      color: var(--muted);
      font-size: 11px;
    }
    #status {
      min-height: 18px;
      margin-top: 8px;
      color: var(--ok);
      font-size: 12px;
    }
  </style>
</head>
<body data-theme="light">
  <svg width="0" height="0" style="position:absolute">
    <symbol id="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path></symbol>
    <symbol id="icon-moon" viewBox="0 0 24 24"><path d="M20.5 14.5A8.5 8.5 0 0 1 9.5 3.5a7 7 0 1 0 11 11Z"></path></symbol>
    <symbol id="icon-monitor" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="12" rx="2"></rect><path d="M8 20h8M12 16v4"></path></symbol>
    <symbol id="icon-gauge" viewBox="0 0 24 24"><path d="M12 14l4-4"></path><path d="M4 14a8 8 0 1 1 16 0"></path><path d="M5 18h14"></path></symbol>
    <symbol id="icon-list" viewBox="0 0 24 24"><path d="M8 6h13M8 12h13M8 18h13"></path><path d="M3 6h.01M3 12h.01M3 18h.01"></path></symbol>
    <symbol id="icon-copy" viewBox="0 0 24 24"><rect x="8" y="8" width="12" height="12" rx="2"></rect><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"></path></symbol>
  </svg>

  <main class="popup">
    <header class="app-header">
      <img class="app-logo" src="icons/icon_origin.svg" alt="Red Viral Monitor">
      <div class="app-title">
        <span class="name" data-i18n="extName">Red Viral Monitor</span>
        <span class="sub" data-i18n="popupSubtitle">小红书网页端热度辅助</span>
      </div>
      <button id="theme-toggle" class="icon-button" type="button" data-i18n-title="themeLabel" aria-label="Theme">
        <svg class="theme-icon"><use href="#icon-monitor"></use></svg>
      </button>
    </header>

    <nav class="tabs" role="tablist">
      <button class="tab-btn" type="button" role="tab" aria-selected="true" data-tab="settings" data-i18n="tabSettings">设置</button>
      <button class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="leaderboard" data-i18n="tabLeaderboard">榜单</button>
      <button class="tab-btn" type="button" role="tab" aria-selected="false" data-tab="about" data-i18n="tabAbout">关于</button>
    </nav>

    <section role="tabpanel" data-tab-panel="settings" data-active="1">
      <form id="settings-form" class="section">
        <h2 class="section-title"><svg><use href="#icon-gauge"></use></svg><span data-i18n="settingsThresholdsTitle">热度阈值</span></h2>
        <div class="row">
          <label for="trending" data-i18n="trendingLabel">升温</label>
          <input id="trending" type="number" min="1" step="10">
        </div>
        <div class="row">
          <label for="viral" data-i18n="viralLabel">爆款</label>
          <input id="viral" type="number" min="1" step="10">
        </div>
        <div class="row">
          <label for="badge-style" data-i18n="badgeStyleLabel">标记样式</label>
          <select id="badge-style">
            <option value="pill-solid" data-i18n="badgeStylePill">徽章</option>
            <option value="inline-classic" data-i18n="badgeStyleInline">简洁</option>
          </select>
        </div>
        <div class="row">
          <span>
            <span class="label" data-i18n="featureCopyMdLabel">复制 Markdown</span>
            <span class="hint" data-i18n="featureCopyMdHint">笔记浮层按钮</span>
          </span>
          <label class="switch"><input id="feat-copy-md" type="checkbox"><span class="slider"></span></label>
        </div>
        <div class="actions">
          <button class="btn primary" type="submit" data-i18n="saveButton">保存</button>
          <button class="btn" id="reset" type="button" data-i18n="resetButton">重置</button>
        </div>
        <div id="status" role="status"></div>
      </form>

      <section class="section">
        <h2 class="section-title"><svg><use href="#icon-monitor"></use></svg><span data-i18n="displayTitle">显示</span></h2>
        <div class="row">
          <label for="language-select" data-i18n="languageLabel">语言</label>
          <select id="language-select">
            <option value="auto" data-i18n="languageAuto">跟随浏览器</option>
            <option value="zh_CN" data-i18n="languageZh">中文</option>
            <option value="en" data-i18n="languageEn">English</option>
            <option value="ja" data-i18n="languageJa">日本語</option>
          </select>
        </div>
      </section>
    </section>

    <section role="tabpanel" data-tab-panel="leaderboard">
      <section class="section">
        <h2 class="section-title"><svg><use href="#icon-list"></use></svg><span data-i18n="leaderboardTitle">热度榜</span></h2>
        <div class="row">
          <span>
            <span class="label" data-i18n="featureLeaderboardLabel">页面榜单</span>
            <span class="hint" data-i18n="featureLeaderboardHint">按互动速度排序</span>
          </span>
          <label class="switch"><input id="feat-leaderboard" type="checkbox"><span class="slider"></span></label>
        </div>
        <div class="row">
          <label for="lb-count" data-i18n="topCountLabel">数量</label>
          <input id="lb-count" type="number" min="1" max="50" step="1">
        </div>
      </section>
      <section class="section">
        <h2 class="section-title"><svg><use href="#icon-list"></use></svg><span data-i18n="columnsTitle">列</span></h2>
        <ul id="lb-col-list" class="columns"></ul>
        <div class="actions">
          <button id="lb-reset-pos" class="btn" type="button" data-i18n="resetLeaderboardPosition">重置榜单位置</button>
        </div>
        <div id="lb-reset-msg" class="hint"></div>
      </section>
    </section>

    <section role="tabpanel" data-tab-panel="about">
      <section class="section">
        <h2 class="section-title"><svg><use href="#icon-copy"></use></svg><span data-i18n="aboutTitle">小红书专用</span></h2>
        <p class="about-copy" data-i18n="aboutBody">当前版本只在 xiaohongshu.com 运行，围绕笔记互动热度、页面榜单和 Markdown 复制工作。</p>
        <p class="version">v<span id="popup-version"></span></p>
      </section>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
