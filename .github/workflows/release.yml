name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Test
        run: npm test

      - name: Build zip
        run: |
          npm run build:dist
          mkdir -p release
          cd dist
          zip -r ../release/red-viral-monitor-${{ github.ref_name }}.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/red-viral-monitor-${{ github.ref_name }}.zip
          body: |
            ## Red Viral Monitor ${{ github.ref_name }}

            ### Install

            1. Download `red-viral-monitor-${{ github.ref_name }}.zip` below
            2. Unzip the downloaded file
            3. Open Chrome or Edge and visit `chrome://extensions/`
            4. Toggle **Developer mode** on (top right corner)
            5. Click **Load unpacked** (top left)
            6. Select the unzipped folder and confirm
            7. Visit `xiaohongshu.com`

            ### Heat Thresholds

            | Label | Default |
            |-------|---------|
            | UP | 100/h |
            | HOT | 500/h |
